      - name: Generate Wokwi diagram.json
        run: |
          cat > tests/platformio/diagram.json <<'EOF'
          {
            "version": 1,
            "editor": "wokwi",
            "author": "puara-gestures",
            "parts": [
              {
                "type": "wokwi-tinypico",
                "id": "esp",
                "attrs": {}
              }
            ],
            "connections": [
              [
                "esp:TX0",
                "$serialMonitor:RX",
                ""
              ],
              [
                "esp:RX0",
                "$serialMonitor:TX",
