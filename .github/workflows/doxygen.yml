name: Doxygen Documentation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Doxygen and LaTeX
        run: |
          sudo apt-get update -y
          sudo apt-get install -y doxygen graphviz texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended

      - name: Create docs output directory
        run: |
          mkdir -p docs/doxygen/html

      - name: Generate documentation
        run: |
          doxygen Doxyfile

      - name: Build PDF documentation
        run: |
          if [ -d docs/doxygen/latex ]; then
            cd docs/doxygen/latex
            make pdf
            cp refman.pdf ../html/puara-gestures-docs.pdf
          fi

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v5
        with:
          name: doxygen-html
          path: docs/doxygen/html

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/doxygen/html

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v5
