name: Doxygen Documentation

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Doxygen and LaTeX
        run: |
          sudo apt-get update -y
          sudo apt-get install -y doxygen graphviz texlive-latex-recommended texlive-latex-extra texlive-fonts-recommended texlive-font-utils

      - name: Create docs output directory
        run: |
          mkdir -p docs/doxygen/html

      - name: Generate documentation
        run: |
          doxygen Doxyfile

      - name: Build PDF documentation
        run: |
          if [ -d docs/doxygen/latex ]; then
            cd docs/doxygen/latex
            make pdf
            cp refman.pdf ../html/puara-gestures-docs.pdf
          fi

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v5
        with:
          name: doxygen-html
          path: docs/doxygen/html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PUARA_ARDUINO_REPO_TOKEN }}
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/doxygen/html

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        with:
          token: ${{ secrets.PUARA_ARDUINO_REPO_TOKEN }}
