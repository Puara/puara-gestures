name: Puara-Gestures Arduino CI
on:
  pull_request:
  push:
    branches:
      - main
      - 89-make-arduino-examples-for-all-classes  # or remove the filter entirely

#concurrency:
#  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
#  cancel-in-progress: true

# These jobs uses the actions defined in the puara/actions repository. These actions are shared with puara-module-templates.
jobs:

  generate-arduino-library:
    runs-on: ubuntu-latest
    steps:
      - name: generate arduino lib from puara gestures  
        uses: puara/actions/puara-gestures/generate-arduino-library@main
        with:
          puara-arduino-repo-token: ${{ secrets.PUARA_ARDUINO_REPO_TOKEN }}

  lint-arduino-library:
   runs-on: ubuntu-latest
   needs: generate-arduino-library
   steps:
     - name: lint generated arduino library 
       uses: puara/actions/puara-gestures/lint-arduino-library@main

  compile-arduino-library:
   runs-on: ubuntu-latest
   needs: generate-arduino-library
   steps:
     - name: generate
       uses: puara/actions/puara-gestures/compile-arduino-library@main

  push-arduino-library:
    runs-on: ubuntu-latest
   # needs: compile-arduino-library
    steps:
      - name: push generated arduino library to puara-arduino repository
        uses: puara/actions/puara-gestures/push-arduino-library@main
        with: 
          puara-arduino-repo-token: ${{ secrets.PUARA_ARDUINO_REPO_TOKEN }}