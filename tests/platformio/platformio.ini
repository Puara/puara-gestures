[platformio]
default_envs = samd

; Arduino SAMD boards (Arduino Zero, MKR, etc)
[env:samd]
platform = atmelsam
board = zero
framework = arduino
lib_deps =
    Eigen
    boost-embedded-190
build_flags =
    -Iinclude
    -I../include
    -I../../3rdparty
    -I../../3rdparty/eigen
    -I../../3rdparty/IMU_Sensor_Fusion
src_dir = .
src_filter = +<platformio_sketch_test.cpp>
