[platformio]
default_envs = avr, samd

; Arduino AVR boards (Uno, Mega, etc)
[env:avr]
platform = atmelavr
board = uno
framework = arduino
lib_deps =
    Eigen
    boost-embedded-190
build_flags =
    -Iinclude
    -I../include
    -I../../3rdparty
    -I../../3rdparty/eigen
    -I../../3rdparty/IMU_Sensor_Fusion
src_dir = .
src_filter = +<platformio_sketch_test.cpp>

; Arduino SAMD boards (Arduino Zero, MKR, etc)
[env:samd]
platform = atmelsam
board = zero
framework = arduino
lib_deps =
    ArduinoEigen
    boost-embedded-190
build_flags =
    -Iinclude
    -I../include
    -I../../3rdparty
    -I../../3rdparty/eigen
    -I../../3rdparty/IMU_Sensor_Fusion
src_dir = .
src_filter = +<platformio_sketch_test.cpp>
